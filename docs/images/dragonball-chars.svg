<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Dragon Claude Sprites</title>
  <desc id="desc">Portada de sprites Dragon Ball para README</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#111136"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c400"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="400" rx="16" fill="#0e0e1c" stroke="#2a2a50" stroke-width="2"/>

  <text x="80" y="130" fill="url(#accent)" font-family="monospace" font-size="56" font-weight="700">
    DRAGON CLAUDE
  </text>
  <text x="80" y="190" fill="#00d4ff" font-family="monospace" font-size="30">
    dragonball-chars.html
  </text>
  <text x="80" y="255" fill="#dde0ff" font-family="monospace" font-size="24">
    Sprites y referencia visual del proyecto
  </text>

  <g transform="translate(760 110)">
    <rect x="0" y="0" width="300" height="220" rx="12" fill="#0a0a18" stroke="#f5c400" stroke-width="2"/>
    <text x="20" y="42" fill="#f5c400" font-family="monospace" font-size="20">PIXEL PREVIEW</text>
    <rect x="30" y="70" width="24" height="24" fill="#ff6600"/>
    <rect x="54" y="70" width="24" height="24" fill="#f5c400"/>
    <rect x="78" y="70" width="24" height="24" fill="#00d4ff"/>
    <rect x="102" y="70" width="24" height="24" fill="#00ff88"/>
    <rect x="126" y="70" width="24" height="24" fill="#bb66ff"/>
    <rect x="30" y="94" width="24" height="24" fill="#111"/>
    <rect x="54" y="94" width="24" height="24" fill="#f5c4a0"/>
    <rect x="78" y="94" width="24" height="24" fill="#111"/>
    <rect x="102" y="94" width="24" height="24" fill="#f5c4a0"/>
    <rect x="126" y="94" width="24" height="24" fill="#111"/>
  </g>
</svg>
