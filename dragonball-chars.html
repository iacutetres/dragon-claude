<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball — Pixel Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }
  h1 {
    color: #FF9A00;
    font-size: 11px;
    text-shadow: 0 0 20px #FF6B00, 3px 3px 0 #000;
    margin-bottom: 6px;
    letter-spacing: 3px;
    text-align: center;
  }
  .subtitle {
    color: #FFD700;
    font-size: 6px;
    margin-bottom: 32px;
    letter-spacing: 2px;
    opacity: 0.8;
  }
  .chars-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    max-width: 900px;
  }
  .char-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  .char-name  { color: #fff;    font-size: 7px; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
  .char-power { color: #FF9A00; font-size: 5px; opacity: 0.8; text-align: center; }
  .ground-line {
    width: 90%; max-width: 900px; height: 2px;
    background: linear-gradient(90deg, transparent, #FF6B00, #FFD700, #FF6B00, transparent);
    margin: 36px 0 16px;
    box-shadow: 0 0 10px #FF9A00;
  }
  .footer { color: #333; font-size: 5px; letter-spacing: 2px; }
  #starfield { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
  .dball {
    position: fixed; width: 20px; height: 20px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFD700, #FF6B00);
    box-shadow: 0 0 10px #FF9A00;
    animation: floatBall linear infinite;
    z-index: 0; pointer-events: none;
  }
  @keyframes floatBall {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateY(-60px) rotate(720deg); opacity: 0; }
  }
</style>

    [x,  x,  beG,beGL,beG,x,  x,  beG,beGL,beG,x,  x,  x  ],
    [x,  x,  beG,beGL,beG,x,  x,  beG,beGL,beG,x,  x,  x  ],
    [x,  beG,beGL,beG,beG,x,  x,  beG,beGL,beG,beG,x,  x  ],
  ]); return c;
}

// ── RENDER ────────────────────────────────────────────────────
var characters = [
  { name:'GOKU',    power:'SUPER SAIYAN',       glow:'#FFD700', draw:drawGoku    },
  { name:'VEGETA',  power:'PRINCE OF SAIYANS',  glow:'#FFD700', draw:drawVegeta  },
  { name:'GOHAN',   power:'ULTIMATE WARRIOR',   glow:'#aa44ff', draw:drawGohan   },
  { name:'PICCOLO', power:'NAMEKIAN WARRIOR',   glow:'#00ff44', draw:drawPiccolo },
  { name:'KRILLIN', power:"EARTH'S STRONGEST",  glow:'#FF7722', draw:drawKrillin },
  { name:'TRUNKS',  power:'TIME WARRIOR',       glow:'#bb44ff', draw:drawTrunks  },
  { name:'BULMA',   power:'GENIUS INVENTOR',    glow:'#44aaff', draw:drawBulma   },
  { name:'FRIEZA',  power:'EMPEROR OF EVIL',    glow:'#cc77ff', draw:drawFrieza  },
  { name:'BEERUS',  power:'GOD OF DESTRUCTION', glow:'#8844cc', draw:drawBeerus  },
];

var grid = document.getElementById('grid');

characters.forEach(function(char){
  var card = document.createElement('div');
  card.className = 'char-card';

  var canvas = char.draw();
  canvas.style.filter = 'drop-shadow(0 4px 10px rgba(0,0,0,0.8))';

  // float
  var t = Math.random() * Math.PI * 2;
  (function loop(){
    t += 0.03;
    canvas.style.transform = 'translateY(' + (Math.sin(t)*4) + 'px)';
    requestAnimationFrame(loop);
  })();

  card.addEventListener('mouseenter', function(){ canvas.style.filter = 'drop-shadow(0 0 18px '+char.glow+')'; });
  card.addEventListener('mouseleave', function(){ canvas.style.filter = 'drop-shadow(0 4px 10px rgba(0,0,0,0.8))'; });

  var name = document.createElement('div');
  name.className = 'char-name';
  name.textContent = char.name;

  var power = document.createElement('div');
  power.className = 'char-power';
  power.textContent = char.power;

  card.appendChild(canvas);
  card.appendChild(name);
  card.appendChild(power);
  grid.appendChild(card);
});

// ── STARFIELD ─────────────────────────────────────────────────
var sf = document.getElementById('starfield');
var sfc = sf.getContext('2d');
sf.width = window.innerWidth;
sf.height = window.innerHeight;
var stars = [];
for(var i=0;i<100;i++) stars.push({ x:Math.random()*sf.width, y:Math.random()*sf.height, r:Math.random()*1.4+0.3, a:Math.random(), s:Math.random()*0.012+0.003 });
(function loop(){
  sfc.clearRect(0,0,sf.width,sf.height);
  stars.forEach(function(s){
    s.a += s.s;
    if(s.a>1||s.a<0) s.s*=-1;
    sfc.globalAlpha = Math.max(0,Math.min(1,s.a));
    sfc.fillStyle = '#fff';
    sfc.beginPath(); sfc.arc(s.x,s.y,s.r,0,Math.PI*2); sfc.fill();
  });
  sfc.globalAlpha = 1;
  requestAnimationFrame(loop);
})();

// ── DRAGON BALLS ──────────────────────────────────────────────
function spawnBall(){
  var b = document.createElement('div');
  b.className = 'dball';
  b.style.left = (Math.random()*92)+'%';
  b.style.animationDuration = (9+Math.random()*10)+'s';
  b.style.animationDelay = (Math.random()*2)+'s';
  document.body.appendChild(b);
  setTimeout(function(){ b.remove(); }, 22000);
}
for(var i=0;i<4;i++) spawnBall();
setInterval(spawnBall, 2000);
</script>
